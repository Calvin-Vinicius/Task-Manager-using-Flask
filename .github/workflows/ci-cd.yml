name: CI/CD Pipeline Task Manager

on:
  push:
    branches: [ main, stage, develop ]
  pull_request:
    branches: [ main, stage ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run Tests
        run: pytest

  sast:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Security Tools
        run: pip install bandit safety
      - name: Run Bandit
        run: bandit -r .
      - name: Run Safety
        run: safety check -r requirements.txt

  dast:
    needs: sast
    runs-on: ubuntu-latest
    steps:
      - name: Run Application in Docker
        run: docker build -t my-flask-app . && docker run -d -p 5000:5000 my-flask-app
      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:5000'