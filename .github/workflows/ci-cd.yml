name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    name: Tests and SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: pytest --cov-report=xml

  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit security scan
        id: run_bandit
        continue-on-error: true # Impede que o erro pare a esteira
        run: |
          bandit -r . | tee bandit-report.txt

      - name: Create Issue on Bandit Failure
        if: steps.run_bandit.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          
          echo "O scan automático do Bandit detectou possíveis problemas de segurança no código." > issue-body.txt
          echo -e "\n### Resumo do Relatório:\n\`\`\`text" >> issue-body.txt
          tail -n 25 bandit-report.txt >> issue-body.txt
          echo -e "\`\`\`\n\nPor favor, verifique os logs completos na aba Actions do GitHub." >> issue-body.txt

         
          gh issue create \
            --title "⚠️ Alerta de Segurança: Vulnerabilidades encontradas pelo Bandit" \
            --body-file issue-body.txt
      

  dependency_check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'python-app'
          path: '.'
          format: 'HTML'

      - name: Upload Dependency-Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: ${{github.workspace}}/reports